<div class="layout">
  <header class="app-header">
    <h1 class="app-title">Clima</h1>
  </header>

  <section class="search-section">
    <app-search-bar
      [disabled]="weatherService.viewState() === 'loading'"
      (search)="search($event)"
    />
  </section>

  <div class="content-row">
    <main class="main-section">
      @switch (weatherService.viewState()) {
        @case ('loading') { <app-state-message state="loading" /> }
        @case ('not-found') { <app-state-message state="not-found" /> }
        @case ('network') { <app-state-message state="network" /> }
        @case ('error') { <app-state-message state="error" /> }
        @case ('idle') { <app-state-message state="idle" /> }
      }
      @if (weatherService.currentWeather(); as weather) {
        <app-weather-card
          [weather]="weather"
          [stale]="weatherService.viewState() === 'ready-stale'"
          [updating]="weatherService.viewState() === 'ready-updating'"
        />
      }
    </main>

    <aside class="history-section">
      <app-history-list
        [cities]="weatherService.history()"
        (select)="search($event)"
      />
    </aside>
  </div>
</div>
